
services:
  nginx:
    image: nginx-imag
    container_name: nginx
    build: ./requirements/nginx/.
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception

  mariadb:
    image: mariadb-imag
    container_name: mariadb
    build: ./requirements/mariadb/.
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - .env
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    depends_on:
      - mariadb
    image: wordpress-php-imag
    container_name: wordpress
    build: ./requirements/wordpress/.
    restart: always
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception

# Bonus Part
  redis:
    build: ./requirements/bonus/redis/.
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - inception
    env_file:
      - .env
volumes:
  wordpress-data:
  mariadb-data:

networks:
  inception:
    name: inception
